<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test TAI Jerárquico</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f2f2f2;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }
      #quiz-container {
        background: #fff;
        border-radius: 10px;
        padding: 20px 30px;
        width: 95%;
        max-width: 600px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }
      h2,
      h3 {
        text-align: center;
      }
      label {
        display: block;
        margin-top: 10px;
        font-weight: bold;
      }
      select,
      button {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        border: 1px solid #ccc;
        border-radius: 6px;
      }
      select[multiple] {
        min-height: 120px;
        padding: 8px;
      }
      select[multiple] option {
        padding: 6px;
        margin-bottom: 2px;
      }
      select[multiple] option:checked {
        background: linear-gradient(#007bff, #007bff);
        background-color: #007bff;
        color: white;
      }
      button {
        background: #007bff;
        color: #fff;
        border: none;
        cursor: pointer;
        font-size: 1em;
      }
      button:hover {
        background: #0056b3;
      }
      .option {
        display: block;
        margin: 8px 0;
      }
      .tip {
        font-size: 0.9em;
        color: #555;
        text-align: center;
        margin-top: 5px;
        font-style: italic;
      }
      #instruccion-botones {
        display: none;
        margin-top: 20px;
        padding: 10px;
        border: 1px dashed #007bff;
        background: #f0f8ff;
        font-size: 0.9em;
      }
      #result {
        margin-top: 15px;
        text-align: center;
        font-weight: bold;
      }
      .correct {
        color: green;
      }
      .incorrect {
        color: red;
      }
      a {
        display: block;
        text-align: center;
        margin-top: 10px;
        color: #007bff;
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
      /* Estilos para modo test (más agradable visualmente) */
      body.in-test {
        background: linear-gradient(180deg, #e9f2ff 0%, #ffffff 60%);
      }
      body.in-test #quiz-container {
        max-width: 900px;
        padding: 30px 40px;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.12);
        transform: translateY(-10px);
      }
      body.in-test #selector-temas { display: none; }
      body.in-test #question-container {
        background: linear-gradient(180deg,#ffffff,#fbfeff);
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 6px 18px rgba(0,0,0,0.06);
        margin-top: 10px;
      }
      body.in-test .option { font-size: 1.05em; font-weight: normal; }
      body.in-test #next-btn, body.in-test #exit-btn {
        padding: 12px 18px; font-size: 1em; border-radius:8px;
      }
      #progress-bar { height:8px; background:#e6eefc; border-radius:8px; overflow:hidden; margin-top:10px; }
      #progress-bar > div { height:100%; background:#007bff; width:0%; transition:width .3s ease; }
    </style>
  </head>
  <body>
    <div id="quiz-container">
      <h2>Test CONSTITUCIÓN</h2>

      <!-- Selector jerárquico -->
      <div id="selector-temas">
        <label for="bloque">Bloque:</label>
        <select id="bloque"></select>
        <label for="titulo">Título:</label>
        <select id="titulo"></select>
        <label for="capitulo">Capítulo: <small style="color:#666; font-weight:normal">(Ctrl+click para múltiples)</small></label>
        <select id="capitulo" multiple></select>
        <label for="articulo">Artículo: <small style="color:#666; font-weight:normal">(Ctrl+click para múltiples)</small></label>
        <select id="articulo" multiple></select>

        <label for="testSize">Tamaño del test:</label>
        <select id="testSize">
          <option value="5">5</option>
          <option value="10">10</option>
          <option value="15" selected>15</option>
          <option value="20">20</option>
        </select>
        <p>Selecciona modo:</p>
        <button onclick="startQuiz('practica')">Modo Práctica 🧠</button>
        <button onclick="startQuiz('examen')">Modo Examen 📝</button>
        <a href="editor.html">✏️ Editar preguntas</a>
        <a href="estadisticas.html">📊 Ver estadísticas</a>
      </div>

      <div id="progress-bar" style="display:none"><div></div></div>
      <div id="question-container" style="display: none"></div>
      <div style="display:flex; gap:10px; justify-content:center; margin-top:10px">
        <button id="next-btn" style="display: none">Siguiente</button>
        <button id="exit-btn" style="display: none; background:#6c757d">Salir al índice</button>
      </div>
      <div id="result"></div>
      <div id="instruccion-botones"></div>
    </div>

    <script>
      let allQuestions = [];
      let questions = [];
      let currentQuestion = 0;
      let score = 0;
      let mode = "examen";
      let userAnswers = [];
      let tituloActual = "";
      // Variables para almacenar la selección actual para reinicio
      let currentBloque = "";
      let currentTitulo = "";
      let currentCapitulos = [];
      let currentArticulos = [];
      let currentTestSize = 15;

      function loadQuestions() {
        const data = localStorage.getItem("preguntasTAI");
        return data ? JSON.parse(data) : [];
      }

      function populateSelectors() {
        allQuestions = loadQuestions();
        if (allQuestions.length === 0) {
          alert("⚠️ No hay preguntas guardadas. Añádelas desde el editor.");
          location.href = "editor.html";
          return;
        }

        const bloques = [
          ...new Set(allQuestions.map((q) => q.titulos?.[0] || "Sin Bloque")),
        ];
        bloques.sort((a, b) => {
          const numA = parseInt(a.match(/\d+/)) || 0;
          const numB = parseInt(b.match(/\d+/)) || 0;
          return numA - numB;
        });
        const bloqueSel = document.getElementById("bloque");
        bloqueSel.innerHTML =
          `<option value="">Todos</option>` +
          bloques.map((b) => `<option value="${b}">${b}</option>`).join("");
        bloqueSel.addEventListener("change", updateTitulos);
        document.getElementById("titulo").addEventListener("change", updateCapitulos);
        document.getElementById("capitulo").addEventListener("change", updateArticulos);

        // Restaurar última selección
        const ultima = JSON.parse(localStorage.getItem("ultimaSeleccion") || "{}");
        if (ultima.bloque) document.getElementById("bloque").value = ultima.bloque;
        if (ultima.testSize) document.getElementById("testSize").value = ultima.testSize;
        updateTitulos();
        if (ultima.titulo) document.getElementById("titulo").value = ultima.titulo;
        updateCapitulos();
        if (ultima.capitulos && ultima.capitulos.length > 0) {
          const capituloSelect = document.getElementById("capitulo");
          Array.from(capituloSelect.options).forEach(opt => {
            opt.selected = ultima.capitulos.includes(opt.value);
          });
        }
        updateArticulos();
        if (ultima.articulos && ultima.articulos.length > 0) {
          const articuloSelect = document.getElementById("articulo");
          Array.from(articuloSelect.options).forEach(opt => {
            opt.selected = ultima.articulos.includes(opt.value);
          });
        }
      }

      function updateTitulos() {
        const bloque = document.getElementById("bloque").value;
        const titulos = [
          ...new Set(
            allQuestions
              .filter((q) => !bloque || q.titulos?.[0] === bloque)
              .map((q) => q.titulos?.[1])
              .filter(Boolean)
          ),
        ];

        titulos.sort((a, b) => {
          const numA = parseInt(a.match(/\d+/)) || 0;
          const numB = parseInt(b.match(/\d+/)) || 0;
          return numA - numB;
        });

        document.getElementById("titulo").innerHTML =
          `<option value="">Todos</option>` +
          titulos.map((t) => `<option value="${t}">${t}</option>`).join("");
        updateCapitulos();
      }
      function updateCapitulos() {
        const bloque = document.getElementById("bloque").value;
        const titulo = document.getElementById("titulo").value;
        const capitulos = [
          ...new Set(
            allQuestions
              .filter(
                (q) =>
                  (!bloque || q.titulos?.[0] === bloque) &&
                  (!titulo || q.titulos?.[1] === titulo)
              )
              .map((q) => (q.titulos && q.titulos.length > 3 ? q.titulos[2] : null))
              .filter(Boolean)
          ),
        ];

        capitulos.sort((a, b) => {
          const numA = parseInt(a.match(/\d+/)) || 0;
          const numB = parseInt(b.match(/\d+/)) || 0;
          return numA - numB;
        });

        document.getElementById("capitulo").innerHTML =
          `<option value="">Todos</option>` +
          capitulos.map((c) => `<option value="${c}">${c}</option>`).join("");

        updateArticulos();
      }

      function updateArticulos() {
        const bloque = document.getElementById("bloque").value;
        const titulo = document.getElementById("titulo").value;
        const capituloSelect = document.getElementById("capitulo");
        const capitulos = Array.from(capituloSelect.selectedOptions).map(opt => opt.value).filter(v => v !== "");
        
        const articulos = [
          ...new Set(
            allQuestions
              .filter((q) => {
                const qCap = q.titulos && q.titulos.length > 3 ? q.titulos[2] : "";
                const qArt = q.titulos && q.titulos.length > 3 ? q.titulos[3] : q.titulos?.[2];
                const capitulos_check = capitulos.length === 0;
                return (
                  (!bloque || q.titulos?.[0] === bloque) &&
                  (!titulo || q.titulos?.[1] === titulo) &&
                  (capitulos_check || capitulos.includes(qCap))
                );
              })
              .map((q) => (q.titulos && q.titulos.length > 3 ? q.titulos[3] : q.titulos?.[2]))
              .filter(Boolean)
          ),
        ];

        articulos.sort((a, b) => {
          const numA = parseInt(a.match(/\d+/)) || 0;
          const numB = parseInt(b.match(/\d+/)) || 0;
          return numA - numB;
        });

        document.getElementById("articulo").innerHTML =
          `<option value="">Todos</option>` +
          articulos.map((a) => `<option value="${a}">${a}</option>`).join("");
      }

      function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
      }

      // Retorna peso de una pregunta basado en estadísticas y dificultad
      // Prioriza preguntas difíciles y aquellas con más fallos
      function computeQuestionWeight(q) {
        try {
          // Peso base según dificultad
          let difficultyWeight = 1.0;
          switch (q.dificultad) {
            case "facil": difficultyWeight = 0.5; break;
            case "dificil": difficultyWeight = 1.8; break;
            case "medio": difficultyWeight = 1.0; break;
            default: difficultyWeight = 1.0;
          }

          const stats = JSON.parse(localStorage.getItem("estadisticasTAI") || "{}");
          let ac = 0, fa = 0;
          // Agregar recuentos de todas las rutas donde la pregunta exista (más robusto)
          Object.values(stats).forEach((s) => {
            if (s && s.preguntas && s.preguntas[q.question]) {
              ac += s.preguntas[q.question].aciertos || 0;
              fa += s.preguntas[q.question].fallos || 0;
            }
          });
          const total = ac + fa;
          if (total === 0) return 0.5 * difficultyWeight; // desconocida -> prioridad media
          // suavizado: (fallos + 0.5) / (total + 1) => mayor si hay más fallos
          const statsWeight = (fa + 0.5) / (total + 1);
          
          // Combinar pesos: 60% dificultad, 40% estadísticas
          return (0.6 * difficultyWeight + 0.4 * statsWeight);
        } catch (e) {
          return 0.5;
        }
      }

      // Muestreo ponderado sin reemplazo
      function weightedSampleWithoutReplacement(arr, k) {
        const items = arr.slice();
        const weights = items.map(computeQuestionWeight);
        const selected = [];
        while (selected.length < k && items.length > 0) {
          const total = weights.reduce((s, w) => s + w, 0);
          let r = Math.random() * total;
          let idx = -1;
          for (let i = 0; i < weights.length; i++) {
            r -= weights[i];
            if (r <= 0) { idx = i; break; }
          }
          if (idx === -1) idx = weights.length -1;
          selected.push(items.splice(idx,1)[0]);
          weights.splice(idx,1);
        }
        return selected;
      }

      function startQuiz(selectedMode) {
        mode = selectedMode;
        const bloque = document.getElementById("bloque").value;
        const titulo = document.getElementById("titulo").value;
        
        // Obtener múltiples selecciones de capítulos
        const capituloSelect = document.getElementById("capitulo");
        const capitulos = Array.from(capituloSelect.selectedOptions).map(opt => opt.value).filter(v => v !== "");
        
        // Obtener múltiples selecciones de artículos
        const articuloSelect = document.getElementById("articulo");
        const articulos = Array.from(articuloSelect.selectedOptions).map(opt => opt.value).filter(v => v !== "");

        // Tamaño del test según selección del usuario (por defecto 15)
        const testSize = parseInt(document.getElementById("testSize").value) || 15;

        // Guardar selección en localStorage
        localStorage.setItem("ultimaSeleccion", JSON.stringify({
          bloque: bloque,
          titulo: titulo,
          capitulos: capitulos,
          articulos: articulos,
          testSize: testSize
        }));

        // Guardar selección actual para reinicio
        currentBloque = bloque;
        currentTitulo = titulo;
        currentCapitulos = capitulos.slice();
        currentArticulos = articulos.slice();
        currentTestSize = testSize;

        // Si se seleccionó capítulo(s) (y NO artículo(s)), construimos
        // un test de hasta `testSize` preguntas 
        if (capitulos.length > 0 && articulos.length === 0) {
          // Agrupar preguntas por artículo dentro de los capítulos seleccionados (se mantiene para filtrar candidatos)
          const agrupadas = {};
          allQuestions.forEach((q) => {
            const qBloque = q.titulos?.[0] || "";
            const qTitulo = q.titulos?.[1] || "";
            const qCap = q.titulos && q.titulos.length > 3 ? q.titulos[2] : "";
            const qArt = q.titulos && q.titulos.length > 3 ? q.titulos[3] : q.titulos?.[2];
            if (( !bloque || qBloque === bloque) && (!titulo || qTitulo === titulo) && capitulos.includes(qCap)) {
              if (!qArt) return;
              agrupadas[qArt] = agrupadas[qArt] || [];
              agrupadas[qArt].push(JSON.parse(JSON.stringify(q)));
            }
          });

          // Si no hay preguntas en los capítulos seleccionados
          const totalDisponibles = Object.values(agrupadas).reduce((s, arr) => s + arr.length, 0);
          if (totalDisponibles === 0) {
            alert("No hay preguntas para este filtro.");
            return;
          }

          // Convertir a lista de candidatos (flatted)
          const candidatos = [];
          Object.values(agrupadas).forEach(arr => arr.forEach(q => candidatos.push(q)));

          // Selección ponderada para favorecer preguntas con más fallos
          const seleccion = weightedSampleWithoutReplacement(candidatos, testSize);

          if (seleccion.length < testSize) {
            // llenar con las que queden (no debería pasar)
            const restantes = candidatos.filter(c => !seleccion.includes(c));
            shuffleArray(restantes);
            while (seleccion.length < testSize && restantes.length > 0) seleccion.push(restantes.shift());
          }

          questions = seleccion;
          // Barajar la selección final para mayor aleatoriedad
          shuffleArray(questions);
          const capitulosStr = capitulos.length === 1 ? capitulos[0] : `${capitulos.length} capítulos`;
          tituloActual = [bloque, titulo, capitulosStr].filter(Boolean).join(" > ") || "General";
        } else {
          // Copia profunda de las preguntas filtradas para no mutar allQuestions
          questions = allQuestions
            .filter((q) => {
              const qCap = q.titulos && q.titulos.length > 3 ? q.titulos[2] : "";
              const qArt = q.titulos && q.titulos.length > 3 ? q.titulos[3] : q.titulos?.[2];
              const capitulos_check = capitulos.length === 0;
              const articulos_check = articulos.length === 0;
              return (
                (!bloque || q.titulos?.[0] === bloque) &&
                (!titulo || q.titulos?.[1] === titulo) &&
                (capitulos_check || capitulos.includes(qCap)) &&
                (articulos_check || articulos.includes(qArt))
              );
            })
            .map((q) => JSON.parse(JSON.stringify(q)));

          if (questions.length === 0) {
            alert("No hay preguntas para este filtro.");
            return;
          }

            // Selección ponderada al tamaño del test (favorecer preguntas con más fallos)
            if (questions.length > testSize) {
              questions = weightedSampleWithoutReplacement(questions, testSize);
            } else {
              shuffleArray(questions);
            }

            const capitulosStr = capitulos.length > 1 ? `${capitulos.length} capítulos` : (capitulos.length === 1 ? capitulos[0] : "");
            const articulosStr = articulos.length > 1 ? `${articulos.length} artículos` : (articulos.length === 1 ? articulos[0] : "");
            tituloActual = [bloque, titulo, capitulosStr, articulosStr].filter(Boolean).join(" > ") || "General";
        }

        // Barajar orden de preguntas
        shuffleArray(questions);

        // Barajar opciones de cada pregunta y recalcular índice de la respuesta correcta
        questions.forEach((q) => {
          if (!Array.isArray(q.options)) q.options = [];
          const correctText = q.options[q.answer];
          shuffleArray(q.options);
          q.answer = q.options.indexOf(correctText);
          if (q.answer === -1) q.answer = 0; // fallback si datos no consistentes
        });

        currentQuestion = 0;
        score = 0;
        userAnswers = [];
        document.getElementById("selector-temas").style.display = "none";
        const instru = document.getElementById("instruccion-botones");
        if (instru) {
          instru.innerHTML =
            "Usa las teclas 1‑4 para marcar una opción, o haz clic en ella. " +
            "Después presiona <strong>Enter</strong> para confirmar.";
          instru.style.display = "block";
        }
        document.getElementById("question-container").style.display = "block";
        document.getElementById("next-btn").style.display = "inline-block";
        document.getElementById("next-btn").textContent = "Siguiente ➡️";
        const exitBtn = document.getElementById("exit-btn");
        exitBtn.style.display = "inline-block";
        exitBtn.onclick = exitQuiz;
        // Activar estilos visuales del modo test
          document.body.classList.add('in-test');
          // Mostrar barra de progreso
          const pb = document.getElementById('progress-bar');
          if (pb) { pb.style.display = 'block'; pb.firstElementChild.style.width = '0%'; }
        showQuestion();
      }

      function restartQuiz() {
        // Restaurar los valores de los selects
        document.getElementById("bloque").value = currentBloque;
        document.getElementById("titulo").value = currentTitulo;
        document.getElementById("testSize").value = currentTestSize;

        // Restaurar capítulos seleccionados
        const capituloSelect = document.getElementById("capitulo");
        Array.from(capituloSelect.options).forEach(opt => {
          opt.selected = currentCapitulos.includes(opt.value);
        });

        // Restaurar artículos seleccionados
        const articuloSelect = document.getElementById("articulo");
        Array.from(articuloSelect.options).forEach(opt => {
          opt.selected = currentArticulos.includes(opt.value);
        });

        // Iniciar el quiz con el mismo modo
        startQuiz(mode);
      }

      function showQuestion() {
        const q = questions[currentQuestion];
        const container = document.getElementById("question-container");
        container.innerHTML = `
        <p style="font-size:15px">Pregunta ${currentQuestion + 1} de ${
          questions.length
        }</p>
        <p class="question-text"><strong>${q.question}</strong></p>
        ${q.options
          .map(
            (opt, i) => `
          <label class="option">
            <input type="radio" name="answer" value="${i}"> ${opt}
          </label>
        `
          )
          .join("")}
      `;
        document.getElementById("result").textContent = "";

        // Actualizar barra de progreso (preguntas respondidas / total)
        const pb = document.getElementById('progress-bar');
        if (pb && questions.length) {
          const pct = Math.round((currentQuestion / questions.length) * 100);
          pb.firstElementChild.style.width = pct + '%';
        }

        // Reseteamos el evento anterior del botón
        const nextBtn = document.getElementById("next-btn");
        nextBtn.onclick = checkAnswer;
        nextBtn.textContent = "Confirmar";
        
      }

      function checkAnswer() {
        const selected = document.querySelector('input[name="answer"]:checked');
        if (!selected)
          return alert("Selecciona una opción antes de continuar.");
        const sel = parseInt(selected.value);
        const q = questions[currentQuestion];
        const isCorrect = sel === q.answer;

        userAnswers.push({
          question: q.question,
          selected: q.options[sel],
          correct: q.options[q.answer],
          isCorrect,
          titulos: q.titulos || []
        });
        if (isCorrect) score++;

        const resultDiv = document.getElementById("result");
        if (mode === "practica") {
          resultDiv.innerHTML = isCorrect
            ? "<span class='correct'>✅ Correcto</span>"
            : `<span class='incorrect'>❌ Incorrecto</span><br>Correcta: <em>${
                q.options[q.answer]
              }</em>`;
        }

        const nextBtn = document.getElementById("next-btn");
        nextBtn.onclick = nextQuestion;
        nextBtn.textContent =
          currentQuestion + 1 < questions.length ? "Siguiente ➡️" : "Finalizar";
        // Actualizar barra de progreso tras confirmar respuesta
        const pb = document.getElementById('progress-bar');
        if (pb && questions.length) {
          const pct = Math.round(((currentQuestion + 1) / questions.length) * 100);
          pb.firstElementChild.style.width = pct + '%';
        }
      }

      function nextQuestion() {
        currentQuestion++;
        if (currentQuestion < questions.length) showQuestion();
        else showResult();
      }

      function showResult() {
        document.getElementById("question-container").style.display = "none";
        document.getElementById("next-btn").style.display = "none";
        document.getElementById("exit-btn").style.display = "none";
        const instru = document.getElementById("instruccion-botones");
        if (instru) instru.style.display = "none";
        // Desactivar estilos del modo test
        document.body.classList.remove('in-test');
        // Ocultar y llenar barra de progreso al finalizar
        const pb = document.getElementById('progress-bar');
        if (pb) { pb.firstElementChild.style.width = '100%'; pb.style.display = 'none'; }

        const result = document.getElementById("result");
        result.innerHTML = `<h3>Resultados (${tituloActual})</h3>
        <p>Has acertado ${score} de ${questions.length} (${Math.round(
          (score / questions.length) * 100
        )}%)</p>
        ${userAnswers
          .map(
            (a, i) => `
          <p><strong>${i + 1}. ${a.question}</strong><br>
          Tu respuesta: ${a.selected} ${a.isCorrect ? "✅" : "❌"}<br>
          ${!a.isCorrect ? `Correcta: ${a.correct}` : ""}</p>
        `
          )
          .join("")}
        <button onclick="restartQuiz()">🔁 Reiniciar</button>
        <a href="estadisticas.html">📊 Ver estadísticas</a>
        <a href="index.html" hover="color:red">🏠 Volver al Test</a>
      `;

        guardarEstadisticas();
      }

      function exitQuiz() {
        if (!confirm("¿Salir del test y volver al índice? Se perderá el progreso actual.")) return;
        // Limpiar estado
        questions = [];
        currentQuestion = 0;
        score = 0;
        userAnswers = [];
        tituloActual = "";
        document.getElementById("question-container").style.display = "none";
        document.getElementById("next-btn").style.display = "none";
        document.getElementById("exit-btn").style.display = "none";
        document.getElementById("selector-temas").style.display = "block";
        const instru = document.getElementById("instruccion-botones");
        if (instru) instru.style.display = "none";
        document.getElementById("result").textContent = "";
        // Desactivar estilos del modo test
        document.body.classList.remove('in-test');
        const pb = document.getElementById('progress-bar');
        if (pb) { pb.firstElementChild.style.width = '0%'; pb.style.display = 'none'; }
      }

      function guardarEstadisticas() {
        const stats = JSON.parse(
          localStorage.getItem("estadisticasTAI") || "{}"
        );
        // Mantener la estadística por la ruta actual (tituloActual)
        if (!stats[tituloActual])
          stats[tituloActual] = {
            totalPreguntas: 0,
            totalAciertos: 0,
            preguntas: {},
          };
        const tituloStats = stats[tituloActual];
        tituloStats.totalPreguntas += questions.length;
        tituloStats.totalAciertos += score;

        userAnswers.forEach((a) => {
          if (!tituloStats.preguntas[a.question])
            tituloStats.preguntas[a.question] = { aciertos: 0, fallos: 0 };
          if (a.isCorrect) tituloStats.preguntas[a.question].aciertos++;
          else tituloStats.preguntas[a.question].fallos++;

          // Además, registrar estadísticas específicas por artículo
          const t = a.titulos || [];
          // Normalizar: si el array es de 4 elementos -> [bloque,titulo,capitulo,articulo]
          // si es de 3 -> [bloque,titulo,articulo]
          let articlePath = null;
          if (t.length >= 4) articlePath = [t[0], t[1], t[2], t[3]].filter(Boolean).join(" > ");
          else if (t.length === 3) articlePath = [t[0], t[1], t[2]].filter(Boolean).join(" > ");

          if (articlePath) {
            if (!stats[articlePath])
              stats[articlePath] = { totalPreguntas: 0, totalAciertos: 0, preguntas: {} };
            const artStats = stats[articlePath];
            artStats.totalPreguntas += 1;
            if (a.isCorrect) artStats.totalAciertos += 1;
            if (!artStats.preguntas[a.question]) artStats.preguntas[a.question] = { aciertos: 0, fallos: 0 };
            if (a.isCorrect) artStats.preguntas[a.question].aciertos++;
            else artStats.preguntas[a.question].fallos++;
          }
        });

        localStorage.setItem("estadisticasTAI", JSON.stringify(stats));
      }

      document.addEventListener("keydown", (e) => {
        // elegir opción con teclas 1‑4
        const key = parseInt(e.key);
        if (key >= 1 && key <= 4) {
          const radio = document.querySelector(
            `input[name="answer"][value="${key - 1}"]`
          );
          if (radio) radio.checked = true;
        }
        // confirmar con Enter si ya hay una selección
        if (e.key === "Enter") {
          const sel = document.querySelector('input[name="answer"]:checked');
          if (sel) {
            // evitar doble envío si el botón ya está en modo "Siguiente"
            if (typeof checkAnswer === 'function') checkAnswer();
          }
        }
        // pasar a la siguiente pregunta con flecha derecha
        if (e.key === "ArrowRight") {
          const nextBtn = document.getElementById("next-btn");
          if (nextBtn && nextBtn.style.display !== "none") {
            nextBtn.click();
          }
        }
      });

      populateSelectors();
    </script>
  </body>
</html>
